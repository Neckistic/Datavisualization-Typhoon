</head>

        function destination(lat, lon, dKm, deg){ const R=6371; const lat1=lat*Math.PI/180, lon1=lon*Math.PI/180, brng=deg*Math.PI/180; const lat2=Math.asin(Math.sin(lat1)*Math.cos(dKm/R)+Math.cos(lat1)*Math.sin(dKm/R)*Math.cos(brng)); const lon2=lon1+Math.atan2(Math.sin(brng)*Math.sin(dKm/R)*Math.cos(lat1), Math.cos(dKm/R)-Math.sin(lat1)*Math.sin(lat2)); return {lat:lat2*180/Math.PI, lng:lon2*180/Math.PI}; }

                    count++;
                }
            });
            document.getElementById('mapMarkerCount').innerText = count + ' shown';

        // 聚合函数
        function aggregateBySignal(filterVal) {
            let filtered = allCyclones;
            if(filterVal !== 'all') {
                const signals = filterVal.split(',').map(Number);
                filtered = allCyclones.filter(c => signals.includes(c.signal));
            }
            const groups = { '1,3': [], '8': [], '9,10': [] };

                if(c.signal <=3) groups['1,3'].push(c);
                else if(c.signal === 8) groups['8'].push(c);
                else groups['9,10'].push(c);
            });
            const result = {};
            Object.keys(groups).forEach(key => {
                const arr = groups[key];
                if(arr.length === 0) { result[key] = null; return; }
                const avgGust = arr.reduce((s,c)=>s+c.maxGust,0)/arr.length;
                const avgRain = arr.reduce((s,c)=>s+c.maxRain,0)/arr.length;
                const avgSurge = arr.reduce((s,c)=>s+c.surge,0)/arr.length;
                const totalLoss = arr.reduce((s,c)=>s+c.loss,0);
                const avgLoss = totalLoss / arr.length;
                const totalAffected = arr.reduce((s,c)=>s+c.affected,0);
                result[key] = { count: arr.length, avgGust, avgRain, avgSurge, totalLoss, avgLoss, totalAffected, raw: arr };
            });
            return { groups: result, filtered };
        }

        // ECharts
        let radarChart, bubbleChart, boxplotChart;
        function updateCharts(aggregated, filteredData) {
            const signals = ['1,3', '8', '9,10'];
            const validGroups = signals.filter(s => aggregated[s] !== null);
            const maxVals = { gust: 200, rain: 500, surge: 2.5, loss: 5000 };
            const radarSeries = validGroups.map(sig => {
                const g = aggregated[sig];
                return {
                    name: sig === '1,3' ? 'Signal 1/3' : (sig==='8'?'Signal 8':'Signal 9/10'),
                    value: [
                        Math.min(10, (g.avgGust / maxVals.gust)*10),
                        Math.min(10, (g.avgRain / maxVals.rain)*10),
                        Math.min(10, (g.avgSurge / maxVals.surge)*10),
                        Math.min(10, (g.avgLoss / maxVals.loss)*10)
                    ]
                };
            });
            radarChart.setOption({
                title: { text: 'Multi‑dimensional Impact Index', left: 'center', top: 0, textStyle: { fontSize: 12 } },
                tooltip: { trigger: 'item' },
                legend: { bottom: 0 },
                radar: { indicator: [{ name: 'Max Gust', max:10 },{ name: 'Max Rain', max:10 },{ name: 'Storm Surge', max:10 },{ name: 'Economic Loss', max:10 }], shape: 'circle' },
                series: [{ type: 'radar', data: radarSeries }]
            });

            const bubbleData = filteredData.filter(c => c.loss > 0 || c.affected > 0).map(c => ({
                value: [c.signal, c.loss, c.affected || 1],
                name: `${c.name} ${c.year}`,
                itemStyle: { color: c.signal>=9?'#e74c3c':(c.signal===8?'#f39c12':'#2ecc71') }
            }));
            bubbleChart.setOption({
                title: { text: 'Economic Loss vs Warning Signal', left: 'center', top: 0, textStyle: { fontSize: 12 } },
                tooltip: { trigger: 'item', formatter: p => `${p.name}<br/>Signal ${p.value[0]} · Loss HK$${p.value[1].toFixed(1)}M<br/>Affected: ${p.value[2]}` },
                xAxis: { name: 'Highest Signal', min: 1, max: 10 }, yAxis: { name: 'Loss (HK$M, adj)', type: 'log', min: 0.1 },
                series: [{ type: 'scatter', data: bubbleData, symbolSize: val => Math.sqrt(val[2]) * 3 + 5 }]
            });

            const boxData = signals.filter(s => aggregated[s]).map(sig => {
                const arr = aggregated[sig].raw.map(c => c.loss).filter(v=>v>0).sort((a,b)=>a-b);
                if(arr.length===0) return null;
                const q1 = arr[Math.floor(arr.length*0.25)], q3 = arr[Math.floor(arr.length*0.75)], median = arr[Math.floor(arr.length*0.5)];
                return { name: sig, min: arr[0], q1, median, q3, max: arr[arr.length-1] };
            }).filter(d=>d);
            boxplotChart.setOption({
                title: { text: 'Loss Distribution by Signal', left: 'center', top: 0, textStyle: { fontSize: 12 } },
                xAxis: { type: 'category', data: boxData.map(d=>d.name) }, yAxis: { type: 'log', name: 'Loss (HK$M)' },
                series: [{ type: 'boxplot', data: boxData.map(d => [d.min, d.q1, d.median, d.q3, d.max]), itemStyle: { color: '#b02c2c' } }]
            });
        }

        function updateStats() {
            document.getElementById('totalPassages').innerText = allCyclones.length;
            const totalLoss = allCyclones.reduce((s,c)=>s+c.loss,0);
            document.getElementById('totalLoss').innerText = (totalLoss/1000).toFixed(2);
            const maxSurge = Math.max(...allCyclones.map(c=>c.surge));
            document.getElementById('peakSurge').innerText = maxSurge.toFixed(2);
            document.getElementById('dataStatus').innerText = `${allCyclones.length} TCs embedded`;
        }

        function applyFilter(filterVal) {
            renderMap(filterVal);
            const agg = aggregateBySignal(filterVal);
            updateCharts(agg.groups, agg.filtered);
        }

        window.onload = function() {
            radarChart = echarts.init(document.getElementById('radarChart'));
            bubbleChart = echarts.init(document.getElementById('bubbleChart'));
            boxplotChart = echarts.init(document.getElementById('boxplotChart'));

            updateStats();
            renderMap('all');
            const agg = aggregateBySignal('all');
            updateCharts(agg.groups, agg.filtered);

            const mapFilter = document.getElementById('mapSignalFilter');
            const chartFilter = document.getElementById('chartSignalFilter');
            mapFilter.addEventListener('change', e => { chartFilter.value = e.target.value; applyFilter(e.target.value); });
            chartFilter.addEventListener('change', e => { mapFilter.value = e.target.value; applyFilter(e.target.value); });
            window.addEventListener('resize', ()=> { radarChart.resize(); bubbleChart.resize(); boxplotChart.resize(); });
        };
    })();
</script>
</body>
</html>
